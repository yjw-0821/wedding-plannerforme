<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웨딩 플래너 💍</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // 설정값 로드
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-planner-default';

        const statusEl = document.getElementById('auth-status');
        const btnEl = document.getElementById('auth-btn');

        // 동기화 시작 로직
        window.handleAuth = async () => {
            btnEl.innerText = "연동 중...";
            btnEl.disabled = true;
            
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        statusEl.innerText = "성공! 이제 모든 기기에서 기록이 실시간 동기화됩니다. 💍";
                        statusEl.classList.replace('text-gray-600', 'text-green-600');
                        btnEl.classList.add('hidden');
                        
                        // 데이터 연동 확인
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'profile');
                        onSnapshot(docRef, (doc) => {
                            if (doc.exists()) {
                                console.log("데이터 동기화 완료");
                            }
                        });
                    }
                });
            } catch (error) {
                statusEl.innerText = "연결 중 오류가 발생했습니다.";
            }
        };
    </script>
</head>
<body class="bg-[#FAF5F5] min-h-screen flex flex-col items-center p-6">
    <div class="w-full max-w-lg bg-white rounded-3xl p-8 shadow-lg border border-pink-50 text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Our Wedding Journal</h1>
        <p class="text-sm text-gray-400 mb-6">소중한 결혼 준비를 기록하세요</p>
        
        <div id="auth-section" class="bg-pink-50/50 p-6 rounded-2xl border border-pink-100">
            <p id="auth-status" class="text-sm text-gray-600 mb-4">로그인 버튼을 누르면 기기 간 기록이 자동 동기화됩니다!</p>
            <button id="auth-btn" onclick="handleAuth()" class="bg-[#D4A373] text-white font-bold py-3 px-6 rounded-xl hover:bg-[#C39364] transition-all w-full">
                동기화 시작하기
            </button>
        </div>
    </div>
</body>
</html>
