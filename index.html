<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예진이의 웨딩 플래너 💍</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        weddingPink: {
                            50: '#FFF5F5',
                            100: '#FFE3E3',
                            200: '#FFC9C9',
                            300: '#FFA3A3',
                            400: '#FF7070',
                            500: '#E29578', // Warm terracotta/rose gold accent
                        },
                        weddingSage: '#83C5BE',
                        weddingTeal: '#006D77',
                        weddingCream: '#FFDDD2'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #FFF5F5 0%, #FFFDFD 100%);
        }
        .serif-title {
            font-family: 'Playfair Display', 'Noto Sans KR', serif;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col items-center pb-20">

    <!-- Toast 알림 레이아웃 -->
    <div id="toast-container" class="fixed top-5 z-50 flex flex-col gap-2 max-w-sm w-full px-4 pointer-events-none"></div>

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-lg px-4 mt-6">
        
        <!-- 상단 헤더 & 프로필 카드 -->
        <header class="bg-white rounded-3xl p-6 shadow-sm border border-pink-100/50 text-center relative overflow-hidden mb-6">
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-weddingCream/20 rounded-full blur-2xl"></div>
            <div class="absolute -bottom-10 -left-10 w-28 h-28 bg-weddingPink-100/30 rounded-full blur-xl"></div>

            <span class="inline-block px-3  py-1 bg-weddingPink-100 text-weddingPink-500 rounded-full text-xs font-semibold mb-3">
                🤵❤️👰 2027년 8월 25일 본식 예정
            </span>
            <h1 class="serif-title text-3xl font-bold tracking-wide text-gray-800 mb-1">Our Wedding</h1>
            <p class="text-sm text-gray-400 mb-4">예진이의 모바일 웨딩 플래너</p>
            
            <!-- 실시간 디데이 -->
            <div class="bg-gradient-to-r from-weddingPink-100 to-weddingCream/50 rounded-2xl p-4 mb-4">
                <span class="text-xs text-weddingPink-500 font-bold block mb-1">Wedding Day Countdown</span>
                <span id="dday-count" class="text-3xl font-extrabold text-weddingPink-500 tracking-wider">D-457</span>
            </div>

            <!-- 클라우드 동기화 상태 및 로그인 안내 -->
            <div class="flex items-center justify-between border-t border-gray-100 pt-4 mt-2">
                <div class="flex items-center gap-2">
                    <span id="sync-icon" class="text-emerald-500 flex items-center gap-1 text-xs font-medium">
                        <svg class="w-4 h-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                        <span id="sync-text">클라우드 자동 저장 중</span>
                    </span>
                </div>
                <!-- 로그인 상태 버튼 -->
                <button id="auth-btn" class="text-xs font-semibold text-weddingTeal bg-weddingSage/20 hover:bg-weddingSage/30 px-3 py-1.5 rounded-lg transition-all">
                    구글 계정 연동하기
                </button>
            </div>
            <!-- 로그인한 사용자 정보 노출 -->
            <div id="user-info" class="text-xxs text-gray-400 mt-2 text-right hidden"></div>
        </header>

        <!-- 탭 메뉴 스위치 -->
        <nav class="flex bg-white/80 backdrop-blur-md p-1.5 rounded-2xl shadow-sm border border-pink-100/50 mb-6">
            <button onclick="switchTab('checklist')" id="tab-checklist" class="flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all bg-weddingPink-500 text-white">
                📅 체크리스트
            </button>
            <button onclick="switchTab('budget')" id="tab-budget" class="flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all text-gray-400 hover:text-gray-700">
                💰 예산장
            </button>
            <button onclick="switchTab('ai')" id="tab-ai" class="flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all text-gray-400 hover:text-gray-700 flex justify-center items-center gap-1">
                💬 AI 비서
            </button>
        </nav>

        <!-- 섹션 1: 체크리스트 탭 -->
        <section id="sec-checklist" class="space-y-4">
            <!-- 진행률 표시 바 -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-pink-100/30">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-bold text-gray-700">체크리스트 달성률</span>
                    <span id="progress-percent" class="text-sm font-bold text-weddingPink-500">0%</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-weddingPink-500 to-weddingCream h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- 신규 할일 추가 인풋 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-100/30 flex gap-2">
                <input type="text" id="new-todo-title" placeholder="새로운 결혼 준비 일정을 입력하세요..." class="flex-1 bg-gray-50 text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-weddingPink-500 border border-transparent focus:border-transparent">
                <button onclick="addCustomTodo()" class="bg-weddingPink-500 hover:bg-weddingPink-500/90 text-white text-sm font-bold px-4 py-2.5 rounded-xl transition-all">추가</button>
            </div>

            <!-- 타임라인별 체크리스트 목록 -->
            <div class="space-y-4" id="todo-list-container">
                <!-- 자바스크립트에서 동적 생성됨 -->
            </div>
        </section>

        <!-- 섹션 2: 예산장 탭 (숨김 기본) -->
        <section id="sec-budget" class="hidden space-y-4">
            <!-- 예산 요약 카드 -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-100/30">
                <h3 class="text-base font-bold text-gray-800 mb-4 flex items-center gap-1.5">
                    📊 예산 요약 현황
                </h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <span class="text-xs text-gray-400 block mb-1">총 예상 금액</span>
                        <span id="summary-expected" class="text-lg font-bold text-gray-700">0 만원</span>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <span class="text-xs text-gray-400 block mb-1">실제 확정 지출액</span>
                        <span id="summary-spent" class="text-lg font-bold text-weddingPink-500">0 만원</span>
                    </div>
                </div>
                <div class="bg-weddingPink-50/50 p-4 rounded-2xl flex justify-between items-center border border-weddingPink-100/30">
                    <div>
                        <span class="text-xs text-gray-500 block">남은 잔금 (실제 지출 - 납부 완료 계약금)</span>
                        <span id="summary-balance" class="text-base font-extrabold text-weddingTeal">0 만원</span>
                    </div>
                    <div class="text-right">
                        <span class="text-xs text-gray-400 block">총 납부한 계약금</span>
                        <span id="summary-deposit" class="text-sm font-bold text-gray-600">0 만원</span>
                    </div>
                </div>
            </div>

            <!-- 예산 항목 추가 버튼/인풋 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-100/30 flex flex-wrap gap-2">
                <input type="text" id="new-budget-name" placeholder="품목명 (예: 신혼여행)" class="flex-1 min-w-[120px] bg-gray-50 text-sm rounded-xl px-3 py-2 border-none focus:outline-none focus:ring-1 focus:ring-weddingPink-500">
                <input type="number" id="new-budget-expected" placeholder="예상(만원)" class="w-20 bg-gray-50 text-sm rounded-xl px-3 py-2 border-none focus:outline-none focus:ring-1 focus:ring-weddingPink-500">
                <button onclick="addCustomBudget()" class="bg-weddingPink-500 hover:bg-weddingPink-500/90 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all">추가</button>
            </div>

            <!-- 예산 세부 리스트 -->
            <div class="bg-white rounded-3xl p-4 shadow-sm border border-pink-100/30 overflow-hidden">
                <h4 class="text-sm font-bold text-gray-700 px-2 pb-3 border-b border-gray-100 mb-2">품목별 지출 세부 내역</h4>
                <div id="budget-items-container" class="space-y-3 divide-y divide-gray-50">
                    <!-- 자바스크립트로 생성 -->
                </div>
            </div>
        </section>

        <!-- 섹션 3: 웨딩 AI 비서 탭 (숨김 기본) -->
        <section id="sec-ai" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-100/30">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-weddingPink-500 to-weddingCream flex items-center justify-center text-white text-xl">
                        💍
                    </div>
                    <div>
                        <h3 class="text-base font-bold text-gray-800">예진님의 AI 웨딩 메이트</h3>
                        <p class="text-xs text-gray-400">결혼 준비에 관해 무엇이든 물어보세요!</p>
                    </div>
                </div>

                <!-- 추천 질문 큐레이션 -->
                <div class="flex flex-wrap gap-1.5 mb-4">
                    <button onclick="setAiQuery('D-15개월에 필수적인 결혼 준비 우선순위는 무엇인가요?')" class="text-xs bg-weddingPink-50 text-weddingPink-500 border border-weddingPink-100 hover:bg-weddingPink-100 px-3 py-1.5 rounded-full transition-all">
                        📍 D-15개월 우선순위
                    </button>
                    <button onclick="setAiQuery('정중하면서도 세련된 모바일 청첩장 초대 글귀 추천해 줘')" class="text-xs bg-weddingPink-50 text-weddingPink-500 border border-weddingPink-100 hover:bg-weddingPink-100 px-3 py-1.5 rounded-full transition-all">
                        ✉️ 청첩장 인사말
                    </button>
                    <button onclick="setAiQuery('스드메 패키지 계약 시 주의할 점 및 추가금 종류 알려줘')" class="text-xs bg-weddingPink-50 text-weddingPink-500 border border-weddingPink-100 hover:bg-weddingPink-100 px-3 py-1.5 rounded-full transition-all">
                        👗 스드메 계약 팁
                    </button>
                </div>

                <!-- 질문 인풋 -->
                <div class="flex gap-2">
                    <input type="text" id="ai-input" placeholder="여기에 질문을 입력해보세요..." class="flex-1 bg-gray-50 text-sm rounded-xl px-4 py-3 border-none focus:outline-none focus:ring-1 focus:ring-weddingPink-500">
                    <button id="send-ai-btn" onclick="askAiPlanner()" class="bg-weddingTeal hover:bg-weddingTeal/90 text-white font-bold px-4 rounded-xl text-sm transition-all flex items-center justify-center">
                        질문하기
                    </button>
                </div>
            </div>

            <!-- 답변 표시부 -->
            <div id="ai-response-box" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-pink-100/30 whitespace-pre-wrap leading-relaxed text-sm text-gray-700">
                <!-- 답변 실시간 로딩 및 표출 -->
            </div>
        </section>

    </div>

    <!-- Firebase SDK 및 앱 구동 로직 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, linkWithCredential, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. Firebase 설정 (환경 변수가 주어질 시 바인딩, 미제공 시 로컬스토리지 백업 모드 활성화)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-wedding-planner';
        let useFirebase = false;
        let db, auth;

        // 임시 로컬 데이터스토어 (Firebase 비활성화 혹은 에러 발생 시 자동 백업용)
        let localState = {
            checklist: [
                { id: "todo1", title: "웨딩홀 투어 및 최종 대관 계약 🏛️", checked: true, period: "D-15개월" },
                { id: "todo2", title: "본식 스냅작가 및 DVD 영상 업체 예약 완료 📸", checked: false, period: "D-15개월" },
                { id: "todo3", title: "제주 야외스냅 혹은 드레스 스튜디오 촬영 스타일 선정 👗", checked: false, period: "D-12개월" },
                { id: "todo4", title: "스드메 패키지 박람회 상담 및 플래너 계약 💄", checked: false, period: "D-10개월" },
                { id: "todo5", title: "신혼여행 희망지 선정 및 비행기 얼리버드 예매 ✈️", checked: false, period: "D-9개월" },
                { id: "todo6", title: "예복 투어 및 맞춤 계약 진행 🤵", checked: false, period: "D-6개월" },
                { id: "todo7", title: "본식 반지 웨딩밴드 브랜드 셀렉 및 오더 💍", checked: false, period: "D-4개월" },
                { id: "todo8", title: "모바일 청첩장 및 종이 청첩장 시안 확인 및 제작 ✉️", checked: false, period: "D-3개월" },
                { id: "todo9", title: "식전 영상 제작 및 최종 가먼트 피팅 체크 🎵", checked: false, period: "D-1개월" }
            ],
            budget: [
                { id: "b1", name: "웨딩홀 대관료 & 식대", expected: 2000, spent: 0, deposit: 200, paid: true },
                { id: "b2", name: "스튜디오/드레스/메이크업", expected: 350, spent: 0, deposit: 50, paid: true },
                { id: "b3", name: "허니문 신혼여행 경비", expected: 600, spent: 0, deposit: 100, paid: false },
                { id: "b4", name: "예물 커플링 반지", expected: 250, spent: 0, deposit: 50, paid: false },
                { id: "b5", name: "신혼가구 & 필수 가전", expected: 1000, spent: 0, deposit: 0, paid: false }
            ]
        };

        // Firebase 초기화 시도
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                useFirebase = true;
                console.log("Firebase initialized successfully.");
            } else {
                throw new Error("No config supplied.");
            }
        } catch (e) {
            console.warn("Using offline localStorage fallback mode. " + e.message);
            updateSyncStatus('offline');
        }

        let currentUser = null;

        // Firebase 연동 상태 시각화 제어
        function updateSyncStatus(status) {
            const syncIcon = document.getElementById('sync-icon');
            const syncText = document.getElementById('sync-text');
            if (status === 'saving') {
                syncIcon.className = "text-amber-500 flex items-center gap-1 text-xs font-medium";
                syncIcon.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 19h-5.5"></path></svg> <span>저장하는 중...</span>`;
            } else if (status === 'synced') {
                syncIcon.className = "text-emerald-500 flex items-center gap-1 text-xs font-medium";
                syncIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span>클라우드 동기화 완료</span>`;
            } else {
                syncIcon.className = "text-gray-400 flex items-center gap-1 text-xs font-medium";
                syncIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m0 0L1 1m1-1h2.002"></path></svg> <span>로컬 오프라인 모드 작동 중</span>`;
            }
        }

        // 2. Auth 로그인 세션 빌드 (RULE 3 준수)
        const initAuth = async () => {
            if (!useFirebase) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth initialization failed. Retrying anonymously...", err);
                try {
                    await signInAnonymously(auth);
                } catch (innerErr) {
                    console.error("Critical Auth Error: Falling back to Offline Mode.", innerErr);
                    useFirebase = false;
                    updateSyncStatus('offline');
                }
            }
        };

        // UI에 유저 상태 렌더링
        function handleUserLoginUI(user) {
            currentUser = user;
            const authBtn = document.getElementById('auth-btn');
            const userInfo = document.getElementById('user-info');
            
            if (!user) {
                authBtn.innerText = "구글 로그인 연동";
                userInfo.classList.add('hidden');
                return;
            }

            if (user.isAnonymous) {
                authBtn.innerText = "구글 계정 연동하기 🔒";
                userInfo.innerHTML = `임시 익명 계정으로 접속 중 (UID: ${user.uid.slice(0, 8)}...)`;
                userInfo.classList.remove('hidden');
            } else {
                authBtn.innerText = "연동 해제(로그아웃)";
                userInfo.innerHTML = `🛡️ 연동 완료: ${user.email}`;
                userInfo.classList.remove('hidden');
            }
        }

        // 구글 로그인 팝업 액션 연동
        window.handleAuthAction = async () => {
            if (!useFirebase) {
                showToast("현재 오프라인 로컬 저장소 모드 상태입니다.", "info");
                return;
            }
            const user = auth.currentUser;
            if (!user) return;

            if (!user.isAnonymous) {
                // 이미 연동되어 있다면 로그아웃 실행
                if (confirm("정말 연동을 해제(로그아웃)하시겠습니까?")) {
                    await signOut(auth);
                    showToast("로그아웃 되었습니다.", "info");
                }
                return;
            }

            // 구글 소셜 연동 진행
            const provider = new GoogleAuthProvider();
            try {
                updateSyncStatus('saving');
                await signInWithPopup(auth, provider);
                showToast("구글 계정과 안전하게 연동되었습니다! 💖", "success");
            } catch (err) {
                console.error("Google Auth failed: ", err);
                showToast("로그인 연동이 취소되었거나 실패했습니다.", "error");
                updateSyncStatus('synced');
            }
        };

        // 데이터 클라우드 동기화 쓰기 (Firebase/LocalStorage 병행)
        window.saveData = async () => {
            if (!useFirebase || !currentUser) {
                localStorage.setItem('wedding_planner_local_state', JSON.stringify(localState));
                updateSyncStatus('offline');
                return;
            }

            updateSyncStatus('saving');
            try {
                // RULE 1 준수: /artifacts/{appId}/users/{userId}/{collectionName}/{docId}
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'weddingState', 'main');
                await setDoc(docRef, localState);
                updateSyncStatus('synced');
            } catch (err) {
                console.error("Cloud saving error: ", err);
                updateSyncStatus('offline');
                showToast("서버 동기화 중 오류 발생: 로컬 임시 보관함에 안전하게 저장됩니다.", "error");
            }
        };

        // 3. UI 렌더링 함수군
        window.renderApp = () => {
            renderDDay();
            renderChecklist();
            renderBudget();
        };

        // 실시간 D-Day 연산
        function renderDDay() {
            const targetDate = new Date("2027-08-25T00:00:00");
            const today = new Date();
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const ddayDisplay = document.getElementById('dday-count');
            if (diffDays > 0) {
                ddayDisplay.innerText = `D-${diffDays}`;
            } else if (diffDays === 0) {
                ddayDisplay.innerText = `D-Day 💍 오늘 결혼해요!`;
            } else {
                ddayDisplay.innerText = `D+${Math.abs(diffDays)} 💖 행복한 결혼 생활 중`;
            }
        }

        // 체크리스트 탭 그리기
        function renderChecklist() {
            const container = document.getElementById('todo-list-container');
            container.innerHTML = '';

            // 기한(Period)별 그룹핑
            const periods = ["D-15개월", "D-12개월", "D-10개월", "D-9개월", "D-6개월", "D-4개월", "D-3개월", "D-1개월", "기타 일정"];
            const grouped = {};
            periods.forEach(p => grouped[p] = []);

            localState.checklist.forEach(todo => {
                const groupKey = periods.includes(todo.period) ? todo.period : "기타 일정";
                grouped[groupKey].push(todo);
            });

            let totalTasks = localState.checklist.length;
            let checkedTasks = localState.checklist.filter(t => t.checked).length;
            const progressPercent = totalTasks > 0 ? Math.round((checkedTasks / totalTasks) * 100) : 0;

            document.getElementById('progress-percent').innerText = `${progressPercent}%`;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            periods.forEach(period => {
                const list = grouped[period];
                if (list.length === 0 && period === "기타 일정") return; // 기타 일정은 비었으면 렌더링하지 않음

                const section = document.createElement('div');
                section.className = "bg-white p-5 rounded-3xl shadow-sm border border-pink-100/30";
                
                const title = document.createElement('h4');
                title.className = "text-xs font-extrabold text-weddingPink-500 uppercase tracking-wider mb-3 flex items-center justify-between";
                title.innerHTML = `<span>📍 ${period}</span> <span class="text-[10px] bg-weddingPink-50 text-weddingPink-500 px-2 py-0.5 rounded">${list.filter(t => t.checked).length}/${list.length} 완료</span>`;
                section.appendChild(title);

                const itemWrapper = document.createElement('div');
                itemWrapper.className = "space-y-3";

                list.forEach(item => {
                    const row = document.createElement('div');
                    row.className = `flex items-center justify-between gap-2 p-1.5 rounded-xl transition-all ${item.checked ? 'bg-gray-50/50' : 'bg-transparent'}`;
                    
                    row.innerHTML = `
                        <label class="flex items-center gap-3 cursor-pointer flex-1 select-none">
                            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleTodoStatus('${item.id}')" class="w-5 h-5 accent-weddingPink-500 rounded border-gray-300 text-weddingPink-500 focus:ring-weddingPink-500">
                            <span class="text-sm font-medium ${item.checked ? 'line-through text-gray-400 font-normal' : 'text-gray-700'}">${item.title}</span>
                        </label>
                        <button onclick="deleteTodoItem('${item.id}')" class="text-gray-300 hover:text-red-400 p-1 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    `;
                    itemWrapper.appendChild(row);
                });

                if(list.length === 0) {
                    const empty = document.createElement('p');
                    empty.className = "text-xs text-gray-300 text-center py-2";
                    empty.innerText = "계획된 일정이 없습니다. 일정을 직접 추가해 보세요!";
                    itemWrapper.appendChild(empty);
                }

                section.appendChild(itemWrapper);
                container.appendChild(section);
            });
        }

        // 할 일 체크 상태 업데이트
        window.toggleTodoStatus = (id) => {
            const index = localState.checklist.findIndex(t => t.id === id);
            if (index !== -1) {
                localState.checklist[index].checked = !localState.checklist[index].checked;
                renderChecklist();
                saveData();
            }
        };

        // 할 일 항목 추가
        window.addCustomTodo = () => {
            const input = document.getElementById('new-todo-title');
            const title = input.value.trim();
            if(!title) {
                showToast("일정 이름을 입력해 주세요!", "warning");
                return;
            }
            const newTodo = {
                id: 'todo_' + Date.now(),
                title: title,
                checked: false,
                period: "기타 일정"
            };
            localState.checklist.push(newTodo);
            input.value = '';
            renderChecklist();
            saveData();
            showToast("새로운 일정이 추가되었습니다.", "success");
        };

        // 할 일 제거
        window.deleteTodoItem = (id) => {
            localState.checklist = localState.checklist.filter(t => t.id !== id);
            renderChecklist();
            saveData();
            showToast("일정이 삭제되었습니다.", "info");
        };

        // 예산 탭 그리기
        function renderBudget() {
            const container = document.getElementById('budget-items-container');
            container.innerHTML = '';

            let totalExpected = 0;
            let totalSpent = 0;
            let totalDeposit = 0;

            localState.budget.forEach(item => {
                totalExpected += item.expected;
                totalSpent += item.spent;
                totalDeposit += item.deposit;

                const row = document.createElement('div');
                row.className = "py-4 flex flex-col gap-2.5";
                
                row.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-bold text-gray-700">${item.name}</span>
                        <button onclick="deleteBudgetItem('${item.id}')" class="text-gray-300 hover:text-red-400 p-1 transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-xs">
                        <div>
                            <span class="text-gray-400 block mb-0.5">예상 금액</span>
                            <div class="flex items-center gap-1 bg-gray-50 rounded-lg px-2 py-1">
                                <input type="number" value="${item.expected}" onchange="updateBudgetValue('${item.id}', 'expected', this.value)" class="w-full bg-transparent text-right font-semibold text-gray-700 focus:outline-none focus:ring-0 p-0 border-none">
                                <span class="text-gray-400">만</span>
                            </div>
                        </div>
                        <div>
                            <span class="text-gray-400 block mb-0.5">실제 지출</span>
                            <div class="flex items-center gap-1 bg-gray-50 rounded-lg px-2 py-1">
                                <input type="number" value="${item.spent}" onchange="updateBudgetValue('${item.id}', 'spent', this.value)" class="w-full bg-transparent text-right font-semibold text-weddingPink-500 focus:outline-none focus:ring-0 p-0 border-none">
                                <span class="text-gray-400">만</span>
                            </div>
                        </div>
                        <div>
                            <span class="text-gray-400 block mb-0.5">계약금 납부</span>
                            <div class="flex items-center gap-1 bg-gray-50 rounded-lg px-2 py-1">
                                <input type="number" value="${item.deposit}" onchange="updateBudgetValue('${item.id}', 'deposit', this.value)" class="w-full bg-transparent text-right font-semibold text-weddingTeal focus:outline-none focus:ring-0 p-0 border-none">
                                <span class="text-gray-400">만</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(row);
            });

            // 요약 산출
            const balance = Math.max(0, totalSpent - totalDeposit); // 남은 잔금

            document.getElementById('summary-expected').innerText = `${totalExpected.toLocaleString()} 만원`;
            document.getElementById('summary-spent').innerText = `${totalSpent.toLocaleString()} 만원`;
            document.getElementById('summary-deposit').innerText = `${totalDeposit.toLocaleString()} 만원`;
            document.getElementById('summary-balance').innerText = `${balance.toLocaleString()} 만원`;
        }

        // 예산 값 변경 처리
        window.updateBudgetValue = (id, field, value) => {
            const index = localState.budget.findIndex(b => b.id === id);
            if (index !== -1) {
                const numericVal = parseInt(value) || 0;
                localState.budget[index][field] = numericVal;
                renderBudget();
                saveData();
            }
        };

        // 새 예산 추가
        window.addCustomBudget = () => {
            const nameInput = document.getElementById('new-budget-name');
            const expectedInput = document.getElementById('new-budget-expected');

            const name = nameInput.value.trim();
            const expected = parseInt(expectedInput.value) || 0;

            if(!name) {
                showToast("품목명을 적어 주세요!", "warning");
                return;
            }

            const newBudget = {
                id: 'budget_' + Date.now(),
                name: name,
                expected: expected,
                spent: 0,
                deposit: 0,
                paid: false
            };

            localState.budget.push(newBudget);
            nameInput.value = '';
            expectedInput.value = '';

            renderBudget();
            saveData();
            showToast("예산 품목이 신규 추가되었습니다.", "success");
        };

        // 예산 삭제
        window.deleteBudgetItem = (id) => {
            localState.budget = localState.budget.filter(b => b.id !== id);
            renderBudget();
            saveData();
            showToast("예산 품목이 삭제되었습니다.", "info");
        };

        // 4. Gemini 2.5 AI 웨딩 비서 통신 로직
        const apiKey = ""; // 시스템이 실행 시간에 바인딩

        // 지수 백오프 기반 API 호출 래퍼 함수
        async function callGeminiApi(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    console.error("Gemini API call error (retrying):", e);
                }
                await new Promise(res => setTimeout(res, delay));
                delay *= 2;
            }
            throw new Error("Gemini AI API 요청 실패. 네트워크 상태를 확인해 주세요.");
        }

        window.setAiQuery = (query) => {
            document.getElementById('ai-input').value = query;
        };

        window.askAiPlanner = async () => {
            const input = document.getElementById('ai-input');
            const query = input.value.trim();
            if(!query) {
                showToast("질문을 입력해 주세요!", "warning");
                return;
            }

            const sendBtn = document.getElementById('send-ai-btn');
            const resBox = document.getElementById('ai-response-box');

            sendBtn.disabled = true;
            sendBtn.innerText = "답변 고민중..⏳";
            resBox.classList.remove('hidden');
            resBox.innerHTML = `<div class="flex items-center gap-2 text-gray-400 justify-center py-4"><svg class="w-5 h-5 animate-spin text-weddingPink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 19h-5.5"></path></svg> <span>웨딩 플래너 AI가 답변을 작성하는 중입니다...</span></div>`;

            const systemPrompt = "너는 친절하고 경력 15년 차의 베테랑 웨딩 플래너 '체리'야. 결혼을 앞둔 '예진'이에게 엄청 따뜻하고, 격려해주는 다정한 톤으로 조언을 해줘. 답변할 때 구체적인 꿀팁, 절약 노하우, 마일스톤 관리를 한눈에 들어오게 정리해 주면 좋겠어. 이모티콘도 적절하게 섞어 써 줘.";

            try {
                const result = await callGeminiApi(query, systemPrompt);
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if(text) {
                    resBox.innerHTML = parseMarkdownToHtml(text);
                } else {
                    resBox.innerText = "AI 비서가 아직 준비되지 않은 답변 양식입니다. 잠시 후 다시 시도해 주세요.";
                }
            } catch (err) {
                resBox.innerText = "오류 발생: " + err.message;
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "질문하기";
            }
        };

        // 아주 가벼운 마크다운 파서 (이해를 돕기 위함)
        function parseMarkdownToHtml(markdown) {
            let html = markdown
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/### (.*?)\n/g, '<h4 class="text-base font-bold text-gray-800 mt-4 mb-2">$1</h4>')
                .replace(/## (.*?)\n/g, '<h3 class="text-lg font-bold text-weddingPink-500 mt-5 mb-2">$1</h3>')
                .replace(/# (.*?)\n/g, '<h2 class="text-xl font-bold text-gray-800 mt-6 mb-3">$1</h2>')
                .replace(/- (.*?)\n/g, '<li class="ml-4 list-disc text-sm text-gray-600">$1</li>');
            return html;
        }

        // 5. Toast 커스텀 모달 알림창 시스템
        window.showToast = (msg, type = "success") => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bg = "bg-emerald-50 border-emerald-100 text-emerald-800";
            let icon = `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            
            if (type === "error") {
                bg = "bg-rose-50 border-rose-100 text-rose-800";
                icon = `<svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else if (type === "warning") {
                bg = "bg-amber-50 border-amber-100 text-amber-800";
                icon = `<svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else if (type === "info") {
                bg = "bg-sky-50 border-sky-100 text-sky-800";
                icon = `<svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            toast.className = `p-4 rounded-2xl border flex items-start gap-3 shadow-lg transform transition-all duration-300 translate-y-2 opacity-0 pointer-events-auto ${bg}`;
            toast.innerHTML = `
                ${icon}
                <div class="flex-1 text-xs font-semibold">${msg}</div>
            `;
            container.appendChild(toast);

            // 나타나기 애니메이션
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            // 사라지기 앤 삭제
            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // 6. 탭 네비게이션 트리거
        window.switchTab = (tabName) => {
            const tabs = ["checklist", "budget", "ai"];
            tabs.forEach(t => {
                const sec = document.getElementById(`sec-${t}`);
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    sec.classList.remove('hidden');
                    btn.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all bg-weddingPink-500 text-white shadow-sm";
                } else {
                    sec.classList.add('hidden');
                    btn.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all text-gray-400 hover:text-gray-700";
                }
            });
        };

        // 7. 생명주기 및 리스너 등록
        window.onload = async () => {
            // 로컬 스토리지에 데이터가 먼저 있는지 체크 후 병합
            const offlineData = localStorage.getItem('wedding_planner_local_state');
            if (offlineData) {
                try {
                    localState = JSON.parse(offlineData);
                } catch(e) {}
            }

            renderApp();

            if (useFirebase) {
                await initAuth();
                onAuthStateChanged(auth, async (user) => {
                    handleUserLoginUI(user);
                    if (user) {
                        // 로그인 완료 후, 파이어스토어에서 개인 데이터 스트림 구독 연동
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'weddingState', 'main');
                        onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                localState = docSnap.data();
                                renderApp();
                                updateSyncStatus('synced');
                            } else {
                                // 구글 서버에 신규 아이디로 데이터가 없다면 기본 상태값 주입
                                saveData();
                            }
                        }, (err) => {
                            console.error("Firestore onSnapshot subscription failed:", err);
                        });
                    }
                });
            }

            // 구글 연동 버튼 클릭 리스너 연결
            document.getElementById('auth-btn').onclick = window.handleAuthAction;
        };

    </script>
</body>
</html>
