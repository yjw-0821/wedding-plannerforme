<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웨딩 플래너 💍</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        peach: {
                            50: '#FFFDFD',
                            100: '#FAF5F5',
                            200: '#FFEBEA',
                            500: '#E07A5F', // Warm peach tone
                        },
                        weddingGold: {
                            50: '#FAF7F2',
                            100: '#F4F1DE', // Soft warm cream
                            500: '#D4A373', // Elegant wedding gold
                            600: '#C39364',
                        },
                        weddingSage: '#606C38', // Natural warm green
                        weddingTeal: '#3D5A80'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FAF5F5;
            background-image: radial-gradient(#F4F1DE 1px, transparent 0), radial-gradient(#F4F1DE 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }
        .serif-title {
            font-family: 'Playfair Display', 'Noto Sans KR', serif;
        }
    </style>
</head>
<body class="min-h-screen text-slate-700 flex flex-col items-center pb-24">

    <!-- Toast 알림 레이아웃 -->
    <div id="toast-container" class="fixed top-5 z-50 flex flex-col gap-2 max-w-sm w-full px-4 pointer-events-none"></div>

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-lg px-4 mt-6">
        
        <!-- 상단 헤더 & 프로필 카드 (따뜻한 감성 복원) -->
        <header class="bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-pink-100/30 text-center relative overflow-hidden mb-6">
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-weddingGold-100/40 rounded-full blur-2xl"></div>
            <div class="absolute -bottom-10 -left-10 w-28 h-28 bg-peach-100/50 rounded-full blur-xl"></div>

            <!-- 디데이 헤더 배지 -->
            <span class="inline-block px-4 py-1.5 bg-weddingGold-100 text-weddingGold-600 rounded-full text-xs font-bold mb-3 border border-weddingGold-500/10">
                🤵❤️👰 <span id="header-wedding-date">2027년 08월 21일</span> 본식
            </span>
            
            <!-- 실시간 변경 가능한 메인 타이틀 & 서브 타이틀 -->
            <h1 id="header-main-title" class="serif-title text-3xl font-bold tracking-wide text-gray-800 mb-1">Our Wedding Journal</h1>
            <p id="header-sub-title" class="text-xs text-gray-400 mb-5">예진이의 소중한 결혼 준비 기록장</p>
            
            <!-- 실시간 디데이 (피치 핑크톤) -->
            <div class="bg-[#F4F1DE]/70 rounded-2xl p-4 mb-4 border border-dashed border-weddingGold-500/30 relative">
                <span class="text-[10px] text-peach-500 font-extrabold uppercase tracking-wider block mb-0.5">Wedding Day Countdown</span>
                <span id="dday-count" class="text-3xl font-extrabold text-[#E07A5F] tracking-wide">D-457</span>
                
                <!-- 설정 변경 트리거 (날짜, 메인 타이틀, 서브 타이틀 통합 수정) -->
                <button onclick="toggleSettingsEditor()" class="absolute top-3 right-3 text-gray-400 hover:text-weddingGold-500 transition-all" title="기록장 타이틀 및 예식일 수정">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>

            <!-- 숨겨진 환경 설정 수정 카드 (본식 날짜, 메인 타이틀, 서브 타이틀 통합 제공) -->
            <div id="settings-editor-box" class="hidden bg-peach-100/50 p-4 rounded-2xl mb-4 border border-peach-200 transition-all text-left space-y-3">
                <h4 class="text-xs font-bold text-gray-700 border-b border-peach-200/50 pb-2 flex items-center gap-1">
                    ⚙️ 기록장 환경설정
                </h4>
                
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 mb-1">💍 변경할 본식 날짜:</label>
                    <input type="date" id="input-wedding-date" class="w-full bg-white border border-gray-200 text-sm rounded-xl px-3 py-2 focus:outline-none focus:ring-1 focus:ring-weddingGold-500">
                </div>
                
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 mb-1">✍️ 메인 타이틀 (영문 권장):</label>
                    <input type="text" id="input-main-title" placeholder="Our Wedding Journal" class="w-full bg-white border border-gray-200 text-sm rounded-xl px-3 py-2 focus:outline-none focus:ring-1 focus:ring-weddingGold-500">
                </div>
                
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 mb-1">✍️ 서브 타이틀:</label>
                    <input type="text" id="input-sub-title" placeholder="예진이의 소중한 결혼 준비 기록장" class="w-full bg-white border border-gray-200 text-sm rounded-xl px-3 py-2 focus:outline-none focus:ring-1 focus:ring-weddingGold-500">
                </div>

                <div class="flex gap-2 justify-end pt-1">
                    <button onclick="toggleSettingsEditor()" class="bg-gray-200 text-gray-700 text-xs font-bold px-3 py-2 rounded-xl transition-all">취소</button>
                    <button onclick="saveSettings()" class="bg-weddingGold-500 hover:bg-weddingGold-600 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all">저장하기</button>
                </div>
            </div>

            <!-- 동기화 및 구글 계정 연동 상태 -->
            <div class="flex items-center justify-between border-t border-dashed border-gray-100 pt-4 mt-2">
                <div class="flex items-center gap-2">
                    <span id="sync-icon" class="text-emerald-600 flex items-center gap-1.5 text-xs font-semibold">
                        <svg class="w-4 h-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                        <span id="sync-text">자동 클라우드 보관 중</span>
                    </span>
                </div>
                <button id="auth-btn" class="text-xs font-bold text-weddingSage bg-weddingGold-100 hover:bg-weddingGold-500/20 px-3 py-1.5 rounded-lg transition-all border border-weddingGold-500/10">
                    구글 계정 연동하기
                </button>
            </div>
            <div id="user-info" class="text-[10px] text-gray-400 mt-2 text-right hidden"></div>
        </header>

        <!-- 탭 메뉴 스위치 -->
        <nav class="flex bg-white p-1.5 rounded-2xl shadow-[0_4px_15px_rgb(0,0,0,0.01)] border border-pink-100/30 mb-6">
            <button onclick="switchTab('checklist')" id="tab-checklist" class="flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all bg-weddingGold-500 text-white">
                📅 체크리스트
            </button>
            <button onclick="switchTab('budget')" id="tab-budget" class="flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all text-gray-400 hover:text-gray-700">
                💰 예산장
            </button>
            <button onclick="switchTab('ai')" id="tab-ai" class="flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all text-gray-400 hover:text-gray-700 flex justify-center items-center gap-1">
                💬 AI 멘토
            </button>
        </nav>

        <!-- 섹션 1: 체크리스트 탭 -->
        <section id="sec-checklist" class="space-y-4">
            <!-- 진행률 표시 바 -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-pink-100/20">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-weddingSage">체크리스트 준비 상황</span>
                    <span id="progress-percent" class="text-xs font-bold text-weddingGold-500">0%</span>
                </div>
                <div class="w-full bg-weddingGold-100/50 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-weddingGold-500 to-peach-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- 신규 할일 추가 인풋 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-100/20 flex gap-2">
                <input type="text" id="new-todo-title" placeholder="새로운 준비 스케줄을 추가해보세요..." class="flex-1 bg-gray-50/50 text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-weddingGold-500 border border-transparent focus:border-transparent">
                <button onclick="addCustomTodo()" class="bg-weddingGold-500 hover:bg-weddingGold-600 text-white text-sm font-bold px-4 py-2.5 rounded-xl transition-all">추가</button>
            </div>

            <!-- 타임라인별 체크리스트 목록 -->
            <div class="space-y-4" id="todo-list-container">
                <!-- 자바스크립트에서 동적 생성됨 -->
            </div>
        </section>

        <!-- 섹션 2: 예산장 탭 -->
        <section id="sec-budget" class="hidden space-y-4">
            <!-- 예산 요약 카드 (상세 보완) -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-100/20">
                <h3 class="text-sm font-bold text-weddingSage mb-4 flex items-center gap-1.5">
                    📖 예산 전체 정산표
                </h3>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-weddingGold-50 p-4 rounded-2xl border border-weddingGold-500/10">
                        <span class="text-[10px] text-gray-400 block mb-1">전체 계획된 예상 금액</span>
                        <span id="summary-expected" class="text-base font-bold text-gray-700">0 만원</span>
                    </div>
                    <div class="bg-peach-100/40 p-4 rounded-2xl border border-peach-200/20">
                        <span class="text-[10px] text-gray-400 block mb-1">실제 확정 지출액</span>
                        <span id="summary-spent" class="text-base font-bold text-peach-500">0 만원</span>
                    </div>
                </div>
                <div class="bg-[#F4F1DE]/50 p-4 rounded-2xl flex justify-between items-center border border-dashed border-weddingGold-500/30">
                    <div>
                        <span class="text-[10px] text-gray-500 block">남은 식후 최종 잔금</span>
                        <span id="summary-balance" class="text-lg font-extrabold text-[#E07A5F]">0 만원</span>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] text-gray-400 block">이미 납부한 총 계약금</span>
                        <span id="summary-deposit" class="text-xs font-bold text-weddingSage">0 만원</span>
                    </div>
                </div>
            </div>

            <!-- 예산 항목 추가 폼 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-100/20 flex flex-col gap-3">
                <h4 class="text-xs font-bold text-weddingGold-600">📌 예산 품목 간편 등록</h4>
                <div class="flex gap-2">
                    <input type="text" id="new-budget-name" placeholder="품목명 (예: 드레스 투어)" class="flex-1 bg-gray-50/50 text-sm rounded-xl px-3 py-2 border border-transparent focus:outline-none focus:ring-1 focus:ring-weddingGold-500 focus:bg-white">
                    <input type="number" id="new-budget-expected" placeholder="예상(만원)" class="w-24 bg-gray-50/50 text-sm rounded-xl px-3 py-2 border border-transparent focus:outline-none focus:ring-1 focus:ring-weddingGold-500 focus:bg-white">
                    <button onclick="addCustomBudget()" class="bg-weddingGold-500 hover:bg-weddingGold-600 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all">추가</button>
                </div>
            </div>

            <!-- 품목별 아름다운 카드 목록 -->
            <div class="space-y-3" id="budget-items-container">
                <!-- 자바스크립트로 생성 -->
            </div>
        </section>

        <!-- 섹션 3: 웨딩 AI 비서 탭 -->
        <section id="sec-ai" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-100/20">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-weddingGold-500 to-peach-500 flex items-center justify-center text-white text-lg shadow-sm">
                        🌸
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-gray-800">예진님의 AI 웨딩 카운슬러</h3>
                        <p class="text-[10px] text-gray-400">결혼식의 다양한 팁과 절약 전략을 물어보세요.</p>
                    </div>
                </div>

                <!-- 추천 질문 큐레이션 -->
                <div class="flex flex-wrap gap-1.5 mb-4">
                    <button onclick="setAiQuery('예식장이 15개월 남은 지금, 웨딩홀 투어 시 꼭 체크해야 할 체크리스트 5가지를 추천해 줘.')" class="text-xs bg-peach-100/50 text-peach-500 hover:bg-peach-200/50 px-3 py-1.5 rounded-full transition-all">
                        🏛️ 웨딩홀 체크포인트
                    </button>
                    <button onclick="setAiQuery('가성비 있으면서도 만족스러운 실속 있는 스드메 계약 요령과 꿀팁을 친절하게 가르쳐 줘.')" class="text-xs bg-peach-100/50 text-peach-500 hover:bg-peach-200/50 px-3 py-1.5 rounded-full transition-all">
                        👗 스드메 가성비 전략
                    </button>
                </div>

                <!-- 질문 인풋 -->
                <div class="flex gap-2">
                    <input type="text" id="ai-input" placeholder="여기에 궁금한 사항을 적어보세요..." class="flex-1 bg-gray-50/50 text-sm rounded-xl px-4 py-3 border border-transparent focus:outline-none focus:ring-1 focus:ring-weddingGold-500 focus:bg-white">
                    <button id="send-ai-btn" onclick="askAiPlanner()" class="bg-weddingSage hover:bg-weddingSage/90 text-white font-bold px-4 rounded-xl text-sm transition-all flex items-center justify-center">
                        질문
                    </button>
                </div>
            </div>

            <!-- 답변 표시부 -->
            <div id="ai-response-box" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-pink-100/20 whitespace-pre-wrap leading-relaxed text-sm text-gray-700">
            </div>
        </section>

    </div>

    <!-- Firebase SDK 및 앱 구동 로직 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, linkWithCredential, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. Firebase 설정
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-wedding-planner';
        let useFirebase = false;
        let db, auth;

        // 초기의 따스하고 유용한 기본 결혼 일정 및 예산장 복원
        let localState = {
            weddingDate: "2027-08-21",
            mainTitle: "Our Wedding Journal",
            subTitle: "예진이의 소중한 결혼 준비 기록장",
            checklist: [
                { id: "todo1", title: "마음에 드는 베뉴 웨딩홀 선정 및 계약 🏛️", checked: true, period: "D-15개월" },
                { id: "todo2", title: "예약 경쟁 치열한 본식 스냅작가 & DVD 가계약 📸", checked: false, period: "D-15개월" },
                { id: "todo3", title: "인기 있는 제주 스냅 또는 드레스 스튜디오 예약 완료 👗", checked: false, period: "D-12개월" },
                { id: "todo4", title: "가성비 뛰어난 동행/비동행 스드메 상담 및 플래너 계약 💄", checked: false, period: "D-10개월" },
                { id: "todo5", title: "신혼여행 항공편 특가 모니터링 및 선예매 완료 ✈️", checked: false, period: "D-9개월" },
                { id: "todo6", title: "맞춤 예복 브랜드 상담 및 계약 완료 🤵", checked: false, period: "D-6개월" },
                { id: "todo7", title: "가장 오래 끼게 될 웨딩밴드 브랜드 오더 완료 💍", checked: false, period: "D-4개월" },
                { id: "todo8", title: "친척 및 친구들에게 보낼 종이/모바일 청첩장 완료 ✉️", checked: false, period: "D-3개월" },
                { id: "todo9", title: "식전 동영상 제작 및 턱시도/드레스 최종 점검 가먼트 피팅 🎵", checked: false, period: "D-1개월" }
            ],
            budget: [
                { id: "b1", name: "웨딩홀 대관료 & 예식 식대 비용", expected: 1800, spent: 0, deposit: 200 },
                { id: "b2", name: "스튜디오 드레스 메이크업 패키지", expected: 300, spent: 0, deposit: 50 },
                { id: "b3", name: "동남아 / 유럽 신혼여행 총액 경비", expected: 500, spent: 0, deposit: 100 },
                { id: "b4", name: "종로 / 백화점 브랜드 웨딩밴드 커플링", expected: 250, spent: 0, deposit: 50 }
            ]
        };

        // Firebase 이니셜라이징
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                useFirebase = true;
                console.log("Firebase initialized.");
            } else {
                throw new Error("Config unprovided.");
            }
        } catch (e) {
            console.warn("Using offline state cache mode: " + e.message);
            updateSyncStatus('offline');
        }

        let currentUser = null;

        // 동기화 시각 현황판 제어
        function updateSyncStatus(status) {
            const syncIcon = document.getElementById('sync-icon');
            const syncText = document.getElementById('sync-text');
            if (status === 'saving') {
                syncIcon.className = "text-amber-500 flex items-center gap-1.5 text-xs font-semibold";
                syncIcon.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 19h-5.5"></path></svg> <span>클라우드 저장 중</span>`;
            } else if (status === 'synced') {
                syncIcon.className = "text-emerald-600 flex items-center gap-1.5 text-xs font-semibold";
                syncIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span>동기화 및 안전 저장 완료</span>`;
            } else {

        // 2. Auth 로그인 세션 빌드 (RULE 3 준수)

        // D-day 계산 및 본식 날짜 표시
        function renderDDay() {
            const weddingDateStr = localState.weddingDate || "2027-08-21";
            const targetDate = new Date(weddingDateStr + "T00:00:00");
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            // 헤더 표시 문자 포맷팅 (예: 2027년 08월 21일)
            const d = new Date(weddingDateStr);
            const formattedDate = `${d.getFullYear()}년 ${String(d.getMonth() + 1).padStart(2, '0')}월 ${String(d.getDate()).padStart(2, '0')}일`;
            document.getElementById('header-wedding-date').innerText = formattedDate;

            const ddayDisplay = document.getElementById('dday-count');
            if (diffDays > 0) {
                ddayDisplay.innerText = `D-${diffDays}`;
            } else if (diffDays === 0) {
                ddayDisplay.innerText = `D-Day 💐 오늘 최고로 행복하게 만나요!`;
            } else {
                ddayDisplay.innerText = `D+${Math.abs(diffDays)} 💕 행복한 우리 부부의 여정`;
            }
        }

        // 체크리스트 탭 그리기
        function renderChecklist() {
            const container = document.getElementById('todo-list-container');
            container.innerHTML = '';

            const periods = ["D-15개월", "D-12개월", "D-10개월", "D-9개월", "D-6개월", "D-4개월", "D-3개월", "D-1개월", "기타 일정"];
            const grouped = {};
            periods.forEach(p => grouped[p] = []);

            localState.checklist.forEach(todo => {
                const groupKey = periods.includes(todo.period) ? todo.period : "기타 일정";
                grouped[groupKey].push(todo);
            });

            let totalTasks = localState.checklist.length;
            let checkedTasks = localState.checklist.filter(t => t.checked).length;
            const progressPercent = totalTasks > 0 ? Math.round((checkedTasks / totalTasks) * 100) : 0;

            document.getElementById('progress-percent').innerText = `${progressPercent}%`;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            periods.forEach(period => {
                const list = grouped[period];

                const section = document.createElement('div');
                section.className = "bg-white p-5 rounded-3xl shadow-[0_4px_15px_rgb(0,0,0,0.015)] border border-pink-100/10";
                
                const title = document.createElement('h4');
                title.className = "text-xs font-bold text-weddingSage tracking-wider mb-4 flex items-center justify-between border-b border-gray-50 pb-2";
                title.innerHTML = `<span>🎋 ${period} 일지</span> <span class="text-[10px] bg-weddingGold-100 text-weddingGold-600 px-2 py-0.5 rounded-full">${list.filter(t => t.checked).length}/${list.length} 완료</span>`;
                section.appendChild(title);

                const itemWrapper = document.createElement('div');
                itemWrapper.className = "space-y-3";

                list.forEach(item => {
                    const row = document.createElement('div');
                    row.className = `flex items-center justify-between gap-3 p-2 rounded-xl transition-all ${item.checked ? 'bg-gray-50/50' : 'bg-transparent'}`;

        // 할 일 체크 토글

        // 예산장 탭 그리기 (개선된 카드 리스트)
        function renderBudget() {

                card.className = "bg-white p-5 rounded-2xl shadow-[0_4px_15px_rgb(0,0,0,0.01)] border border-pink-100/10 hover:shadow-md transition-all";
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">

                            <div class="flex items-center gap-0.5">
                                <input type="number" value="${item.deposit}" onchange="updateBudgetValue('${item.id}', 'deposit', this.value)" class="w-full bg-transparent text-right text-xs font-bold text-weddingGold-500 focus:outline-none p-0 border-none">
                                <span class="text-[10px] text-weddingGold-400">만</span>

                container.appendChild(card);
            });

            // 계산액 산출
            const balance = Math.max(0, totalSpent - totalDeposit);

            document.getElementById('summary-expected').innerText = `${totalExpected.toLocaleString()} 만원`;
            document.getElementById('summary-spent').innerText = `${totalSpent.toLocaleString()} 만원`;

        // 개별 예산 정보 수정
        window.updateBudgetValue = (id, field, value) => {
            const index = localState.budget.findIndex(b => b.id === id);

        // 예산 품목 신규 추가

        // 예산 품목 삭제
        window.deleteBudgetItem = (id) => {
            localState.budget = localState.budget.filter(b => b.id !== id);
            renderBudget();

            showToast("선택하신 품목이 장부에서 제외되었습니다.", "info");
        };

        // 4. Gemini 2.5 AI 웨딩 비서 통신 로직
        const apiKey = ""; // 시스템 실행 시간에 바인딩

        async function callGeminiApi(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    console.error("Gemini API call error (retrying):", e);
                }
                await new Promise(res => setTimeout(res, delay));
                delay *= 2;
            }
            throw new Error("Gemini AI API 요청 실패.");
        }

        window.setAiQuery = (query) => {
            document.getElementById('ai-input').value = query;
        };

        window.askAiPlanner = async () => {
            const input = document.getElementById('ai-input');
            const query = input.value.trim();
            if(!query) {
                showToast("궁금하신 사항을 입력해주세요!", "warning");
                return;
            }

            const sendBtn = document.getElementById('send-ai-btn');
            const resBox = document.getElementById('ai-response-box');

            sendBtn.disabled = true;
            sendBtn.innerText = "⏳";
            resBox.classList.remove('hidden');
            resBox.innerHTML = `<div class="flex items-center gap-2 text-gray-400 justify-center py-4"><svg class="w-5 h-5 animate-spin text-weddingGold-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 19h-5.5"></path></svg> <span>웨딩 플래너 체리가 노하우를 정리하고 있습니다...</span></div>`;

            const systemPrompt = "너는 친절하고 경력 15년 차의 베테랑 웨딩 플래너 '체리'야. 결혼을 앞둔 '예진'이에게 따스하고 아기자기하며, 신부를 격려해주는 다정한 톤으로 정량적인 예산 절약 꿀팁, 스케줄 관리 요령을 정리해서 설명해줘. 이모티콘도 다정하게 섞어 써줘.";

            try {
                const result = await callGeminiApi(query, systemPrompt);
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if(text) {
                    resBox.innerHTML = parseMarkdownToHtml(text);
                } else {
                    resBox.innerText = "답변 작성 양식을 수신하지 못했습니다. 다시 물어봐 주세요!";
                }
            } catch (err) {
                resBox.innerText = "오류 발생: " + err.message;
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "질문";
            }
        };

        function parseMarkdownToHtml(markdown) {
            let html = markdown
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/### (.*?)\n/g, '<h4 class="text-xs font-extrabold text-weddingSage mt-4 mb-1 border-b pb-1">$1</h4>')
                .replace(/## (.*?)\n/g, '<h3 class="text-sm font-bold text-weddingGold-600 mt-5 mb-1.5">$1</h3>')
                .replace(/# (.*?)\n/g, '<h2 class="text-base font-bold text-gray-800 mt-6 mb-2">$1</h2>')
                .replace(/- (.*?)\n/g, '<li class="ml-4 list-disc text-xs text-gray-600 my-1">$1</li>');
            return html;
        }

            let bg = "bg-emerald-50 border-emerald-100 text-emerald-800";
            let icon = `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            
            if (type === "error") {
                bg = "bg-rose-50 border-rose-100 text-rose-800";
                icon = `<svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else if (type === "warning") {
                bg = "bg-amber-50 border-amber-100 text-amber-800";
                icon = `<svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else if (type === "info") {
                bg = "bg-sky-50 border-sky-100 text-sky-800";
                icon = `<svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            toast.className = `p-4 rounded-2xl border flex items-start gap-3 shadow-lg transform transition-all duration-300 translate-y-2 opacity-0 pointer-events-auto ${bg}`;
            toast.innerHTML = `
                ${icon}
                <div class="flex-1 text-xs font-semibold">${msg}</div>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // 6. 탭 네비게이션 트리거
        window.switchTab = (tabName) => {
            const tabs = ["checklist", "budget", "ai"];
            tabs.forEach(t => {
                const sec = document.getElementById(`sec-${t}`);
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    sec.classList.remove('hidden');
                    btn.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all bg-weddingGold-500 text-white shadow-sm";
                } else {
                    sec.classList.add('hidden');
                    btn.className = "flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all text-gray-400 hover:text-gray-700";
                }
            });
        };

        // 7. 생명주기 및 리스너 등록
        window.onload = async () => {
            // 로컬 스토리지 데이터 마이그레이션 백업
            const offlineData = localStorage.getItem('wedding_planner_local_state_v2');
            if (offlineData) {
                try {
                    localState = JSON.parse(offlineData);
                } catch(e) {}
            }

            // 구글 설정 데이터 미설정 대비 기본값 보존
            if (!localState.mainTitle) localState.mainTitle = "Our Wedding Journal";
            if (!localState.subTitle) localState.subTitle = "예진이의 소중한 결혼 준비 기록장";

            renderApp();

            if (useFirebase) {
                await initAuth();
                onAuthStateChanged(auth, async (user) => {
                    handleUserLoginUI(user);
                    if (user) {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'weddingState', 'main');
                        onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                localState = docSnap.data();
                                
                                // 오래된 스키마 예외 방어코드
                                if (!localState.mainTitle) localState.mainTitle = "Our Wedding Journal";
                                if (!localState.subTitle) localState.subTitle = "예진이의 소중한 결혼 준비 기록장";
                                
                                renderApp();
                                updateSyncStatus('synced');
                            } else {
                                saveData();
                            }
                        }, (err) => {
                            console.error("Firestore sync subscription failed:", err);
                        });
                    }
                });
            }

            document.getElementById('auth-btn').onclick = window.handleAuthAction;
        };

    </script>
</body>
</html>
